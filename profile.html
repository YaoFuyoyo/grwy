<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人主页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 16px;
    }
    
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #f0f0f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 16px;
      color: #666;
    }
    
    .error-container {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 16px;
      text-align: center;
      padding: 20px;
    }
    
    .error-icon {
      font-size: 64px;
    }
    
    .error-title {
      font-size: 24px;
      font-weight: 700;
      color: #333;
    }
    
    .error-message {
      font-size: 16px;
      color: #666;
    }
    
    .back-link {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading">
    <div class="spinner"></div>
    <p class="loading-text">正在加载个人主页...</p>
  </div>
  
  <div class="error-container" id="error">
    <div class="error-icon">😕</div>
    <h1 class="error-title" id="errorTitle">页面不存在</h1>
    <p class="error-message" id="errorMessage">该用户尚未创建个人主页</p>
    <a href="https://grwy.zzyy99.cn" class="back-link">去创建我的主页</a>
  </div>

  <script>
    const API_BASE = 'https://fuax8z452l.sealoshzh.site'
    
    // 获取 URL 参数
    const urlParams = new URLSearchParams(window.location.search)
    const subdomain = urlParams.get('subdomain')
    const userId = urlParams.get('userId')
    
    console.log('subdomain:', subdomain)
    console.log('userId:', userId)
    
    // 验证参数
    if (!subdomain || !userId) {
      showError('页面不存在', '缺少必要的参数')
    } else if (!/^\d{6}$/.test(userId)) {
      showError('页面不存在', '用户ID格式错误')
    } else {
      // 加载个人主页
      loadProfile(subdomain, userId)
    }
    
    async function loadProfile(subdomain, userId) {
      try {
        const res = await fetch(`${API_BASE}/getPage?subdomain=${subdomain}&userId=${userId}`)
        
        if (!res.ok) {
          throw new Error('请求失败')
        }
        
        const html = await res.text()
        
        // 检查返回的是否是 HTML
        if (html.includes('<!DOCTYPE html>')) {
          document.open()
          document.write(html)
          document.close()
        } else {
          // 可能是 JSON 错误
          try {
            const data = JSON.parse(html)
            if (data.statusCode === 404) {
              showError('页面不存在', '该用户尚未创建个人主页')
            } else {
              showError('加载失败', data.error || '未知错误')
            }
          } catch (e) {
            showError('加载失败', '返回内容格式错误')
          }
        }
        
      } catch (error) {
        console.error('加载失败:', error)
        showError('加载失败', '网络连接失败，请稍后重试')
      }
    }
    
    function showError(title, message) {
      document.getElementById('loading').style.display = 'none'
      document.getElementById('error').style.display = 'flex'
      document.getElementById('errorTitle').textContent = title
      document.getElementById('errorMessage').textContent = message
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人主页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .loading-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; gap: 16px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #f0f0f0; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 16px; color: #666; }
    .error-container { display: none; flex-direction: column; justify-content: center; align-items: center; height: 100vh; gap: 16px; text-align: center; padding: 20px; }
    .error-icon { font-size: 64px; }
    .error-title { font-size: 24px; font-weight: 700; color: #333; }
    .error-message { font-size: 16px; color: #666; }
    .back-link { display: inline-block; margin-top: 16px; padding: 12px 28px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; text-decoration: none; border-radius: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="loading-container" id="loading">
    <div class="spinner"></div>
    <p class="loading-text">正在加载个人主页...</p>
  </div>
  
  <div class="error-container" id="error">
    <div class="error-icon">😕</div>
    <h1 class="error-title" id="errorTitle">页面不存在</h1>
    <p class="error-message" id="errorMessage">该用户尚未创建个人主页</p>
    <a href="https://grwy.zzyy99.cn" class="back-link">去创建我的主页</a>
  </div>

  <script>
    const API_BASE = 'https://fuax8z452l.sealoshzh.site'
    
    console.log('完整 URL:', window.location.href)
    console.log('pathname:', window.location.pathname)
    console.log('search:', window.location.search)
    
    // 获取参数
    const urlParams = new URLSearchParams(window.location.search)
    let subdomain = urlParams.get('subdomain')
    let userId = urlParams.get('userId')
    
    // 从 pathname 解析备选
    if (!subdomain || !userId) {
      const pathMatch = window.location.pathname.match(/\/([^\/]+)\/(\d{6})/)
      if (pathMatch) {
        subdomain = subdomain || pathMatch[1]
        userId = userId || pathMatch[2]
      }
    }
    
    console.log('subdomain:', subdomain)
    console.log('userId:', userId)
    
    if (!subdomain || !userId) {
      showError('页面不存在', '缺少必要的参数')
    } else {
      loadProfile(subdomain, userId)
    }
    
    async function loadProfile(subdomain, userId) {
      try {
        const res = await fetch(`${API_BASE}/getPage?subdomain=${subdomain}&userId=${userId}`)
        const text = await res.text()
        
        console.log('getPage 返回:', text.substring(0, 200))
        
        // 解析 Laf 返回格式
        let html = text
        try {
          const data = JSON.parse(text)
          if (data.body && typeof data.body === 'string') {
            html = data.body
          }
        } catch (e) {
          // 不是 JSON，直接使用
        }
        
        // 检查是否是 HTML
        if (html.includes('<!DOCTYPE html>') || html.includes('<html')) {
          document.open()
          document.write(html)
          document.close()
        } else {
          showError('加载失败', '返回内容不是有效的 HTML')
        }
        
      } catch (error) {
        console.error('加载失败:', error)
        showError('加载失败', '网络连接失败，请稍后重试')
      }
    }
    
    function showError(title, message) {
      document.getElementById('loading').style.display = 'none'
      document.getElementById('error').style.display = 'flex'
      document.getElementById('errorTitle').textContent = title
      document.getElementById('errorMessage').textContent = message
    }
  </script>
</body>
</html>

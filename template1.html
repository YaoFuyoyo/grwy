<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}} - 个人主页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; 
      background: #ffffff; 
      color: #1a1a1a; 
      line-height: 1.6; 
    }
    .container { 
      max-width: 680px; 
      margin: 0 auto; 
      padding: 80px 24px; 
    }
    .header { margin-bottom: 64px; }
    .name { 
      font-size: 40px; 
      font-weight: 600; 
      letter-spacing: -0.02em; 
      margin-bottom: 8px; 
    }
    .title { 
      font-size: 18px; 
      color: #666; 
      font-weight: 400; 
    }
    .section { margin-bottom: 48px; }
    .section-title { 
      font-size: 12px; 
      text-transform: uppercase; 
      letter-spacing: 0.1em; 
      color: #999; 
      margin-bottom: 16px; 
    }
    .bio { 
      font-size: 16px; 
      color: #444; 
      line-height: 1.8; 
    }
    .contact-item { 
      font-size: 15px; 
      color: #555; 
      margin-bottom: 8px; 
    }
    .contact-item a { 
      color: #1a1a1a; 
      text-decoration: none; 
      border-bottom: 1px solid #ddd; 
    }
    .resume-link { 
      display: inline-block; 
      margin-top: 16px; 
      padding: 10px 24px; 
      border: 1px solid #1a1a1a; 
      color: #1a1a1a; 
      text-decoration: none; 
      font-size: 14px; 
      transition: all 0.2s; 
    }
    .resume-link:hover { 
      background: #1a1a1a; 
      color: #fff; 
    }
    .portfolio { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 16px; 
    }
    .portfolio img { 
      width: 100%; 
      border-radius: 4px; 
    }
    .footer { 
      margin-top: 80px; 
      padding-top: 24px; 
      border-top: 1px solid #eee; 
      font-size: 12px; 
      color: #bbb; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="name">{{name}}</h1>
      <p class="title">{{title}}</p>
    </div>
    
    <div class="section">
      <p class="section-title">About</p>
      <p class="bio">{{bio}}</p>
    </div>
    
    <div class="section">
      <p class="section-title">Contact</p>
      <p class="contact-item">{{email}}</p>
      <p class="contact-item">{{phone}}</p>
      {{RESUME_SECTION}}
    </div>
    
    {{PORTFOLIO_SECTION}}
    
    <div class="footer">
      <p>Generated by Profile Builder</p>
    </div>
  </div>
</body>
</html>

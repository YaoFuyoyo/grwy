<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}} - 个人主页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: #faf6f1; 
      color: #3d3d3d; 
      line-height: 1.6; 
    }
    .container { 
      max-width: 700px; 
      margin: 0 auto; 
      padding: 60px 24px; 
    }
    .header { 
      background: #fff; 
      padding: 48px; 
      border-radius: 20px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.06); 
      margin-bottom: 32px; 
      text-align: center; 
    }
    .name { 
      font-size: 36px; 
      font-weight: 700; 
      color: #2c2c2c; 
      margin-bottom: 8px; 
    }
    .title { 
      font-size: 16px; 
      color: #c17817; 
      font-weight: 500; 
    }
    .card { 
      background: #fff; 
      padding: 32px; 
      border-radius: 16px; 
      box-shadow: 0 2px 12px rgba(0,0,0,0.04); 
      margin-bottom: 24px; 
    }
    .card-title { 
      font-size: 14px; 
      font-weight: 600; 
      color: #c17817; 
      text-transform: uppercase; 
      letter-spacing: 0.1em; 
      margin-bottom: 16px; 
      display: flex; 
      align-items: center; 
      gap: 8px; 
    }
    .bio { 
      font-size: 15px; 
      color: #555; 
      line-height: 1.8; 
    }
    .contact-item { 
      font-size: 15px; 
      color: #666; 
      margin-bottom: 10px; 
      padding: 8px 0; 
      border-bottom: 1px dashed #eee; 
    }
    .contact-item:last-child { 
      border-bottom: none; 
    }
    .resume-link { 
      display: inline-block; 
      margin-top: 12px; 
      padding: 12px 28px; 
      background: #c17817; 
      color: #fff; 
      text-decoration: none; 
      border-radius: 10px; 
      font-size: 14px; 
      font-weight: 500; 
      transition: background 0.2s; 
    }
    .resume-link:hover { 
      background: #a56514; 
    }
    .portfolio { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 16px; 
    }
    .portfolio-item { 
      border-radius: 12px; 
      overflow: hidden; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
    }
    .portfolio-item img { 
      width: 100%; 
      display: block; 
    }
    .footer { 
      text-align: center; 
      padding: 40px 0; 
      font-size: 12px; 
      color: #bbb; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="name">{{name}}</h1>
      <p class="title">{{title}}</p>
    </div>
    
    <div class="card">
      <p class="card-title">📝 关于我</p>
      <p class="bio">{{bio}}</p>
    </div>
    
    <div class="card">
      <p class="card-title">📮 联系方式</p>
      <p class="contact-item">邮箱：{{email}}</p>
      <p class="contact-item">电话：{{phone}}</p>
      {{RESUME_SECTION}}
    </div>
    
    {{PORTFOLIO_SECTION}}
    
    <div class="footer">
      <p>Generated by Profile Builder</p>
    </div>
  </div>
</body>
</html>

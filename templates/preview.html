<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模板预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
    }
    
    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .nav-title {
      font-size: 18px;
      font-weight: 600;
    }
    
    .nav-links {
      display: flex;
      gap: 16px;
    }
    
    .nav-link {
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      color: #ccc;
      font-size: 14px;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    
    .nav-link:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }
    
    .nav-link.active {
      color: #fff;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
    }
    
    .preview-container {
      margin-top: 64px;
      min-height: calc(100vh - 64px);
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    
    .preview-wrapper {
      width: 100%;
      max-width: 800px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    
    .preview-iframe {
      width: 100%;
      min-height: 800px;
      border: none;
      background: #fff;
    }
    
    .close-btn {
      position: fixed;
      top: 80px;
      right: 24px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 101;
    }
    
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    @media (max-width: 768px) {
      .nav-links {
        gap: 8px;
      }
      
      .nav-link {
        padding: 6px 12px;
        font-size: 13px;
      }
      
      .close-btn {
        top: 80px;
        right: 16px;
        padding: 8px 14px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <div class="nav-title">模板预览</div>
    <div class="nav-links">
      <a href="preview.html?template=template1" class="nav-link" id="link-template1">极简白</a>
      <a href="preview.html?template=template2" class="nav-link" id="link-template2">深色科技</a>
      <a href="preview.html?template=template3" class="nav-link" id="link-template3">卡片暖色</a>
    </div>
  </div>
  
  <button class="close-btn" onclick="closePreview()">× 关闭预览</button>
  
  <div class="preview-container">
    <div class="preview-wrapper">
      <iframe class="preview-iframe" id="previewFrame" src="" frameborder="0"></iframe>
    </div>
  </div>

  <script>
    const templates = {
      template1: {
        name: '张 三',
        title: '产品经理',
        bio: '拥有5年互联网产品经验，专注于用户体验和增长策略。曾主导多个百万级用户产品的设计与迭代，擅长从0到1搭建产品体系。',
        email: 'zhangsan@example.com',
        phone: '138-0000-0001'
      },
      template2: {
        name: '李 四',
        title: '全栈工程师',
        bio: '热爱技术，追求极致。精通前后端开发，熟悉 React、Node.js、Go 等技术栈。热衷于开源社区，持续学习新技术。',
        email: 'lisi@example.com',
        phone: '139-0000-0002'
      },
      template3: {
        name: '王 五',
        title: '自由咨询师',
        bio: '资深管理咨询师，专注于企业战略规划和组织优化。服务过50+企业客户，帮助企业实现数字化转型和业务增长。',
        email: 'wangwu@example.com',
        phone: '137-0000-0003'
      }
    };
    
    const resumeSection = `<a href="#" onclick="event.preventDefault()" class="resume-link">📄 下载简历</a>`;
    const portfolioSection = `<div class="section"><p class="section-title">Portfolio</p><div class="portfolio"><div class="portfolio-item"><img src="https://picsum.photos/400/300?random=1" alt="作品"></div><div class="portfolio-item"><img src="https://picsum.photos/400/300?random=2" alt="作品"></div><div class="portfolio-item"><img src="https://picsum.photos/400/300?random=3" alt="作品"></div><div class="portfolio-item"><img src="https://picsum.photos/400/300?random=4" alt="作品"></div></div></div>`;
    
    function getTemplateUrl(templateId) {
      return `${templateId}.html`;
    }
    
    function getCurrentTemplate() {
      const params = new URLSearchParams(window.location.search);
      const template = params.get('template');
      return template && templates[template] ? template : 'template1';
    }
    
    function renderTemplate(templateId) {
      const data = templates[templateId];
      const iframe = document.getElementById('previewFrame');
      
      fetch(getTemplateUrl(templateId))
        .then(response => response.text())
        .then(html => {
          html = html
            .replace(/{{name}}/g, data.name)
            .replace(/{{title}}/g, data.title)
            .replace(/{{bio}}/g, data.bio)
            .replace(/{{email}}/g, data.email)
            .replace(/{{phone}}/g, data.phone)
            .replace(/{{RESUME_SECTION}}/g, resumeSection)
            .replace(/{{PORTFOLIO_SECTION}}/g, portfolioSection);
          
          iframe.srcdoc = html;
        })
        .catch(error => {
          console.error('加载模板失败:', error);
          iframe.srcdoc = '<html><body style="text-align:center;padding:50px;color:#666;">模板加载失败</body></html>';
        });
      
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
      });
      document.getElementById(`link-${templateId}`).classList.add('active');
    }
    
    function closePreview() {
      window.close();
    }
    
    renderTemplate(getCurrentTemplate());
  </script>
</body>
</html>

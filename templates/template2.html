<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}} - 个人主页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', -apple-system, sans-serif; 
      background: #0a0a0f; 
      color: #e0e0e0; 
      line-height: 1.6; 
    }
    .container { 
      max-width: 720px; 
      margin: 0 auto; 
      padding: 80px 24px; 
    }
    .header { 
      margin-bottom: 60px; 
      padding-bottom: 40px; 
      border-bottom: 1px solid #1f1f2e; 
    }
    .name { 
      font-size: 48px; 
      font-weight: 700; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      margin-bottom: 12px; 
    }
    .title { 
      font-size: 18px; 
      color: #888; 
    }
    .section { margin-bottom: 48px; }
    .section-title { 
      font-size: 13px; 
      font-weight: 600; 
      color: #667eea; 
      text-transform: uppercase; 
      letter-spacing: 0.15em; 
      margin-bottom: 20px; 
    }
    .bio { 
      font-size: 16px; 
      color: #b0b0b0; 
      line-height: 1.8; 
    }
    .contact-item { 
      font-size: 15px; 
      color: #999; 
      margin-bottom: 10px; 
    }
    .contact-item a { 
      color: #e0e0e0; 
      text-decoration: none; 
    }
    .resume-link { 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
      margin-top: 20px; 
      padding: 12px 28px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      color: #fff; 
      text-decoration: none; 
      border-radius: 8px; 
      font-size: 14px; 
      font-weight: 500; 
    }
    .portfolio { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 20px; 
    }
    .portfolio-item { 
      position: relative; 
      border-radius: 12px; 
      overflow: hidden; 
      background: #1a1a2e; 
    }
    .portfolio-item img { 
      width: 100%; 
      display: block; 
      transition: transform 0.3s; 
    }
    .portfolio-item:hover img { 
      transform: scale(1.05); 
    }
    .footer { 
      margin-top: 80px; 
      padding-top: 24px; 
      border-top: 1px solid #1f1f2e; 
      font-size: 12px; 
      color: #555; 
      text-align: center; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="name">{{name}}</h1>
      <p class="title">{{title}}</p>
    </div>
    
    <div class="section">
      <p class="section-title">About Me</p>
      <p class="bio">{{bio}}</p>
    </div>
    
    <div class="section">
      <p class="section-title">Get In Touch</p>
      <p class="contact-item">📧 {{email}}</p>
      <p class="contact-item">📱 {{phone}}</p>
      {{RESUME_SECTION}}
    </div>
    
    {{PORTFOLIO_SECTION}}
    
    <div class="footer">
      <p>Generated by Profile Builder</p>
    </div>
  </div>
</body>
</html>
